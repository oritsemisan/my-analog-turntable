<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analog Monolith Turntable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Share+Tech+Mono&display=swap');
      
      body {
        background-color: #1a1a1a;
        font-family: 'Inter', sans-serif;
      }

      /* Custom Scrollbar for Crate */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Pegboard Pattern */
      .bg-pegboard {
        background-image: radial-gradient(#000 2px, transparent 2.5px);
        background-size: 20px 20px;
        background-color: #262626;
      }

      /* Brushed Metal Texture */
      .texture-brushed {
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.03) 2px,
          rgba(255, 255, 255, 0.03) 4px
        );
      }

      /* Vinyl Grooves */
      .vinyl-grooves {
        background: radial-gradient(
          circle,
          #111 28%,
          #1c1c1c 29%,
          #111 30%,
          #1c1c1c 31%,
          #111 32%,
          #1c1c1c 33%,
          #111 34%,
          #1c1c1c 35%,
          #111 36%,
          #1c1c1c 37%,
          #111 38%,
          #1c1c1c 39%,
          #111 40%,
          #1c1c1c 41%,
          #111 42%,
          #1c1c1c 43%,
          #111 44%,
          #1c1c1c 45%,
          #111 46%,
          #1c1c1c 47%,
          #111 48%,
          #1c1c1c 49%,
          #111 50%,
          #1c1c1c 51%,
          #111 52%,
          #1c1c1c 53%,
          #111 54%,
          #1c1c1c 55%,
          #111 56%,
          #1c1c1c 57%,
          #111 58%,
          #1c1c1c 59%,
          #111 60%,
          #1c1c1c 61%,
          #111 62%,
          #1c1c1c 63%,
          #111 64%,
          #1c1c1c 65%,
          #111 66%,
          #1c1c1c 67%,
          #111 68%,
          #1c1c1c 69%,
          #111 70%
        );
      }
      
      /* Strobe Dots Ring */
      .strobe-dots {
        background: repeating-conic-gradient(
          #888 0deg,
          #888 2deg,
          transparent 2deg,
          transparent 4deg
        );
      }

      @keyframes shiver {
        0% { transform: translateY(0px) rotate(0deg); }
        25% { transform: translateY(0.5px) rotate(0.1deg); }
        50% { transform: translateY(-0.5px) rotate(-0.1deg); }
        75% { transform: translateY(0.5px) rotate(0deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      
      .animate-shiver {
        animation: shiver 0.1s infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",

    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</html>
